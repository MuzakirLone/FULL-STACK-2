name: Experiment-16 CI

on:
  push:
    branches: [ "main", "master" ]
    paths:
      - 'Experiment-16/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [ "main", "master" ]
    paths:
      - 'Experiment-16/**'
      - '.github/workflows/ci.yml'

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./Experiment-16/Experiment_16_Backend

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install backend dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov

    - name: Run backend tests
      run: |
        pytest test_app.py --cov=app --cov-report=term-missing

  frontend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./Experiment-16/Experiment_16_Frontend

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install frontend dependencies
      run: npm install

    - name: Run frontend tests
      run: npx vitest run

  build-and-push-docker:
    needs: [backend-tests, frontend-tests]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
    - uses: actions/checkout@v4

    - name: Convert repository name to lowercase
      run: echo "REPO_OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

    - name: Log in to the GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push Backend Docker image
      uses: docker/build-push-action@v5
      with:
        context: ./Experiment-16/Experiment_16_Backend
        push: true
        tags: ghcr.io/${{ env.REPO_OWNER }}/experiment-16-backend:latest

    - name: Build and push Frontend Docker image
      uses: docker/build-push-action@v5
      with:
        context: ./Experiment-16/Experiment_16_Frontend
        push: true
        tags: ghcr.io/${{ env.REPO_OWNER }}/experiment-16-frontend:latest
